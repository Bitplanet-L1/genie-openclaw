name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - run: pnpm build

      # npm 11.5.1+ required for OIDC trusted publishing registry handshake.
      # Node 22 ships npm 10.x, which signs provenance via OIDC but then
      # falls back to anonymous registry PUT (404).
      - run: npm install -g npm@latest

      - run: npm publish --provenance --access public
