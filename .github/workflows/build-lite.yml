name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Smoke test
        run: |
          output=$(timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "::error::Gateway failed with missing module"
            exit 1
          fi

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # --dereference follows pnpm symlinks so extracted node_modules is flat
          tar -czh -f "genie-lite-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            --exclude='node_modules/.pnpm' \
            --exclude='node_modules/.modules.yaml' \
            dist/ extensions/ node_modules/ package.json openclaw.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
