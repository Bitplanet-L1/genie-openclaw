name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Smoke test
        run: |
          output=$(timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "::error::Gateway failed with missing module"
            exit 1
          fi

      - name: Flatten pnpm symlinks
        run: |
          # pnpm node_modules is all symlinks → .pnpm store.
          # Dereference them into a flat layout for tarball portability.
          mkdir -p _flat/node_modules
          # Copy top-level packages (follow symlinks with cp -L)
          for entry in node_modules/*/; do
            name=$(basename "$entry")
            [[ "$name" == ".pnpm" || "$name" == ".modules.yaml" ]] && continue
            cp -rL "$entry" "_flat/node_modules/$name" 2>/dev/null || true
          done
          # Handle scoped packages (@scope/pkg)
          for scope in node_modules/@*/; do
            scope_name=$(basename "$scope")
            mkdir -p "_flat/node_modules/$scope_name"
            for pkg in "$scope"*/; do
              pkg_name=$(basename "$pkg")
              cp -rL "$pkg" "_flat/node_modules/$scope_name/$pkg_name" 2>/dev/null || true
            done
          done
          # Swap
          rm -rf node_modules
          mv _flat/node_modules node_modules
          rmdir _flat
          echo "Flattened node_modules: $(du -sh node_modules | cut -f1)"

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf "genie-lite-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            dist/ extensions/ node_modules/ package.json openclaw.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
