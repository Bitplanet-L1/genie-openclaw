name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Flatten pnpm symlinks
        run: |
          echo "=== Before flatten ==="
          echo "node_modules: $(du -sh node_modules | cut -f1)"

          # pnpm stores real files in .pnpm/ and uses symlinks everywhere else.
          # rsync --copy-links resolves ALL symlinks to real files.
          # We include .pnpm in the copy so transitive deps are resolved too.
          rsync -a --copy-links node_modules/ _flat_modules/

          # Remove the .pnpm store copy (no longer needed — all resolved to real files)
          rm -rf _flat_modules/.pnpm _flat_modules/.modules.yaml

          # Swap
          rm -rf node_modules
          mv _flat_modules node_modules

          echo "=== After flatten ==="
          echo "node_modules: $(du -sh node_modules | cut -f1)"
          echo "Symlinks: $(find node_modules -type l 2>/dev/null | wc -l)"

      - name: Smoke test (flat)
        run: |
          output=$(timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "::error::Gateway failed with missing module after flatten"
            exit 1
          fi

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf "genie-lite-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            dist/ extensions/ node_modules/ package.json openclaw.mjs
          echo "Tarball: $(ls -lh genie-lite-*.tar.gz | awk '{print $5}')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
