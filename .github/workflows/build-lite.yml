name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Reinstall with hoisted node_modules
        run: |
          # Remove pnpm's symlinked node_modules
          rm -rf node_modules
          # Reinstall with hoisted layout (flat, no symlinks — survives tarball)
          # --prod strips devDependencies
          pnpm install --node-linker=hoisted --prod --ignore-scripts=false --config.engine-strict=false --no-frozen-lockfile

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Smoke test
        run: |
          timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf "genie-lite-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            dist/ extensions/ node_modules/ package.json openclaw.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
