name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Replace pnpm node_modules with flat npm install
        run: |
          # pnpm's symlinked .pnpm store doesn't survive tarball extraction.
          # Replace with a flat npm install that works anywhere.
          npm install --package-lock-only --ignore-scripts 2>/dev/null || true
          rm -rf node_modules
          npm install --omit=dev --legacy-peer-deps
          echo "node_modules: $(du -sh node_modules | cut -f1), $(ls node_modules | wc -l) top-level packages"

          ls node_modules/@buape/carbon/dist/src/index.js && echo "✅ carbon dist verified" || echo "⚠️ carbon dist missing"

      - name: Smoke test
        shell: bash {0}
        run: |
          # First test: import the subagent-registry chunk (which imports @buape/carbon)
          node --input-type=module -e "
            import fs from 'node:fs';
            import path from 'node:path';
            import { pathToFileURL } from 'node:url';
            const files = fs.readdirSync('dist');
            const sr = files.find(f => f.startsWith('subagent-registry-') && f.endsWith('.js'));
            if (sr) {
              await import(pathToFileURL(path.join('dist', sr)).href);
              console.log('✅ subagent-registry imported (carbon works)');
            } else {
              console.log('⚠️ no subagent-registry chunk found');
            }
          "
          if [ $? -ne 0 ]; then
            echo "::error::subagent-registry import failed"
            exit 1
          fi

          # Second test: gateway startup (will exit non-zero without config, that's OK)
          output=$(timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "::error::Gateway failed with missing module"
            exit 1
          fi
          echo "✅ All smoke tests passed"

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # IMPORTANT: Do NOT use --exclude='src' — it matches src/ dirs INSIDE
          # node_modules (e.g. @buape/carbon/dist/src/) and strips critical files.
          # src/ is already removed by the prune step.
          tar -czf "genie-lite-v${VERSION}.tar.gz" \
            dist/ extensions/ node_modules/ package.json openclaw.mjs
          echo "Tarball: $(ls -lh genie-lite-*.tar.gz | awk '{print $5}')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
