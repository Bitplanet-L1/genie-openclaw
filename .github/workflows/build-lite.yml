name: Build Genie-Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment (pnpm)
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build with pnpm
        run: pnpm build

      - name: Replace pnpm node_modules with flat npm install
        run: |
          # Generate package-lock.json from pnpm lockfile
          npm install --package-lock-only --ignore-scripts 2>/dev/null || true
          # Remove pnpm's symlinked node_modules
          rm -rf node_modules
          # Install flat node_modules with npm (survives tarball extraction)
          npm install --omit=dev || npm install --omit=dev --legacy-peer-deps

      - name: Prune for Genie-Lite
        run: ./scripts/prune-genie.sh

      - name: Smoke test (import key dist entry points)
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs'
          import path from 'node:path'
          import { pathToFileURL } from 'node:url'

          const distDir = path.resolve('dist')
          const files = fs.readdirSync(distDir)
          const prefixes = [
            'auth-profiles-',
            'reply-',
            'pi-embedded-',
            'auth-choice-',
            'image-',
            'subagent-registry-',
          ]

          for (const prefix of prefixes) {
            const file = files.find((name) => name.startsWith(prefix) && name.endsWith('.js'))
            if (!file) {
              throw new Error(`Missing dist entrypoint for prefix: ${prefix}`)
            }
            await import(pathToFileURL(path.join(distDir, file)).href)
          }
          EOF

          timeout 15 node openclaw.mjs gateway run --port 19999 --bind loopback 2>&1 || true

      - name: Package tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf "genie-lite-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            dist/ extensions/ node_modules/ package.json openclaw.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: genie-lite-*.tar.gz
          generate_release_notes: true
